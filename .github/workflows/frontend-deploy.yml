name: Deploy frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: https://api.geoaiplatform.uz

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp
        working-directory: .

      - name: Deploy to hosting via FTP
        run: |
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER" <<EOF
          set ftp:ssl-allow no
          set ftp:passive-mode yes
          set net:timeout 20
          set net:max-retries 3
          set net:reconnect-interval-base 5
          mirror --reverse --delete --verbose ./dist "$FTP_FRONTEND_DIR"
          bye
          EOF
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_FRONTEND_DIR: ${{ secrets.FTP_FRONTEND_DIR }}
